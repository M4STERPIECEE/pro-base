<div class="relative min-h-screen bg-[#faf8ff]">
  <app-etudiant-sidebar (logoutRequested)="openLogoutModal()"></app-etudiant-sidebar>
  <app-etudiant-topbar></app-etudiant-topbar>
  <section class="ml-64 mt-16 h-[calc(100vh-4rem)] overflow-x-hidden overflow-y-auto">
    <router-outlet></router-outlet>
  </section>

  <div *ngIf="isLogoutModalOpen" class="logout-modal-backdrop" (click)="closeLogoutModal()">
    <div class="logout-modal-card" role="dialog" aria-modal="true" aria-label="Confirmation de déconnexion" (click)="$event.stopPropagation()">
      <h3>Confirmer la déconnexion</h3>
      <p>Voulez-vous vraiment vous déconnecter de l'espace étudiant ?</p>
      <div class="logout-modal-actions">
        <button class="logout-cancel" type="button" (click)="closeLogoutModal()">Annuler</button>
        <button class="logout-confirm" type="button" (click)="logout()">Confirmer</button>
      </div>
    </div>
  </div>
</div>
