<div class="login-page">
  <main class="login-main">
    <div class="brand-header">
      <h1>Se connecter a BDA Notes</h1>
    </div>
    <section class="glass-panel login-card">
      @if (showError) {
        <div class="error-box" role="alert">
          <span class="material-symbols-outlined">error</span>
          <p>{{ errorMessage }}</p>
        </div>
      }
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form" novalidate>
        <div class="field-block">
          <label for="username">Nom d'utilisateur</label>
          <input id="username" type="text" formControlName="username" placeholder="votre.nom" class="input-editorial"/>
        </div>
        <div class="field-block">
          <label for="password">Mot de passe</label>
          <div class="password-field">
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••" class="input-editorial"/>
            <button type="button" class="password-toggle" (click)="togglePasswordVisibility()" [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
              <span class="material-symbols-outlined">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>
        <div class="field-block">
          <label id="role-label">Role</label>
          <div class="custom-dropdown">
            <button id="role-trigger" type="button" class="input-editorial dropdown-trigger" (click)="toggleRoleDropdown()" [attr.aria-expanded]="isRoleDropdownOpen" aria-haspopup="listbox" aria-labelledby="role-label role-trigger" >
              <span>{{ selectedRoleLabel }}</span>
              <span class="material-symbols-outlined" [class.rotated]="isRoleDropdownOpen">expand_more</span>
            </button>
            @if (isRoleDropdownOpen) {
              <div class="dropdown-panel" role="listbox" aria-labelledby="role-label">
                <button type="button" class="dropdown-option" [class.active]="loginForm.controls.role.value === 'GESTIONNAIRE'" (click)="selectRole('GESTIONNAIRE')">
                  Gestionnaire
                </button>
                <button type="button" class="dropdown-option" [class.active]="loginForm.controls.role.value === 'ADMIN'" (click)="selectRole('ADMIN')" >
                  Admin
                </button>
              </div>
            }
          </div>
        </div>
        <button type="submit" class="primary-gradient-btn submit-btn" [disabled]="isLoading">
          @if (isLoading) {
            <span class="material-symbols-outlined spin">progress_activity</span>
          }
          <span>Se connecter</span>
        </button>
      </form>
      <div class="login-footer">
        <button type="button" class="forgot-btn">Mot de passe oublie ?</button>
        <div class="footer-divider"></div>
        <p>Acces reserve au personnel administratif de l'institution</p>
      </div>
    </section>
  </main>
</div>
