<div class="admin-shell relative min-h-screen bg-[#faf8ff]">
  <app-admin-sidebar (logoutRequested)="openLogoutModal()"></app-admin-sidebar>
  <app-admin-topbar></app-admin-topbar>

  <section class="admin-content-host">
    <router-outlet></router-outlet>
  </section>

  <div *ngIf="isLogoutModalOpen" class="modal-backdrop" (click)="closeLogoutModal()">
    <div class="modal-card logout-modal" role="dialog" aria-modal="true" aria-label="Confirmation de déconnexion" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Confirmer la déconnexion</h3>
        <button class="modal-close" type="button" (click)="closeLogoutModal()" aria-label="Fermer">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <p class="logout-modal-text">Voulez-vous vraiment vous déconnecter de l'espace administrateur ?</p>

      <div class="logout-modal-actions">
        <button class="btn-secondary" type="button" (click)="closeLogoutModal()">Annuler</button>
        <button class="btn-primary" type="button" (click)="logout()">
          Confirmer
        </button>
      </div>
    </div>
  </div>
</div>
