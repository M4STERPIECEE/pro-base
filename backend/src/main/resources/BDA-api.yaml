openapi: 3.0.3
info:
  title: BDA API
  description: REST API for managing students, grades, and audit logs.
  version: v1

servers:
  - url: /api
    description: Application context path

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Students
    description: Student endpoints
  - name: Subjects
    description: Subject endpoints
  - name: Grades
    description: Grade endpoints
  - name: Audit
    description: Audit log and statistics endpoints (ADMIN only)

security:
  - bearerAuth: []

paths:

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and obtain a JWT token
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful — JWT returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing or invalid fields
        '401':
          description: Invalid credentials

  /v1/students:
    get:
      tags: [Students]
      summary: Get all students
      operationId: getAllStudents
      responses:
        '200':
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentResponse'
        '401':
          description: Unauthorized
    post:
      tags: [Students]
      summary: Create a new student
      operationId: createStudent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRequest'
      responses:
        '201':
          description: Student created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '409':
          description: Student already exists

  /v1/students/{id}:
    get:
      tags: [Students]
      summary: Get a student by ID
      operationId: getStudentById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Student found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '401':
          description: Unauthorized
        '404':
          description: Student not found
    put:
      tags: [Students]
      summary: Update a student
      operationId: updateStudent
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRequest'
      responses:
        '200':
          description: Student updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '404':
          description: Student not found
        '409':
          description: Name already taken
    delete:
      tags: [Students]
      summary: Delete a student
      operationId: deleteStudent
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Student deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: Student not found

  /v1/subjects:
    get:
      tags: [Subjects]
      summary: Get all subjects
      operationId: getAllSubjects
      responses:
        '200':
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubjectResponse'
        '401':
          description: Unauthorized
    post:
      tags: [Subjects]
      summary: Create a new subject
      operationId: createSubject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectRequest'
      responses:
        '201':
          description: Subject created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectResponse'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '409':
          description: Subject already exists

  /v1/subjects/{id}:
    get:
      tags: [Subjects]
      summary: Get a subject by ID
      operationId: getSubjectById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Subject found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectResponse'
        '401':
          description: Unauthorized
        '404':
          description: Subject not found
    put:
      tags: [Subjects]
      summary: Update a subject
      operationId: updateSubject
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectRequest'
      responses:
        '200':
          description: Subject updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectResponse'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '404':
          description: Subject not found
        '409':
          description: Label already taken
    delete:
      tags: [Subjects]
      summary: Delete a subject
      operationId: deleteSubject
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Subject deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: Subject not found

  /v1/grades:
    get:
      tags: [Grades]
      summary: Get all grades
      operationId: getAllGrades
      responses:
        '200':
          description: List of grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GradeResponse'
        '401':
          description: Unauthorized
    post:
      tags: [Grades]
      summary: Create a new grade
      operationId: createGrade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradeRequest'
      responses:
        '201':
          description: Grade created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeResponse'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '404':
          description: Student or subject not found
        '409':
          description: Grade already exists for this student/subject pair

  /v1/grades/student/{studentId}:
    get:
      tags: [Grades]
      summary: Get grades by student
      operationId: getGradesByStudent
      parameters:
        - $ref: '#/components/parameters/StudentIdPath'
      responses:
        '200':
          description: List of grades for the student
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GradeResponse'
        '401':
          description: Unauthorized
        '404':
          description: Student not found

  /v1/grades/student/{studentId}/subject/{subjectId}:
    get:
      tags: [Grades]
      summary: Get a specific grade
      operationId: getGradeById
      parameters:
        - $ref: '#/components/parameters/StudentIdPath'
        - $ref: '#/components/parameters/SubjectIdPath'
      responses:
        '200':
          description: Grade found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeResponse'
        '401':
          description: Unauthorized
        '404':
          description: Grade not found
    put:
      tags: [Grades]
      summary: Update a grade
      operationId: updateGrade
      parameters:
        - $ref: '#/components/parameters/StudentIdPath'
        - $ref: '#/components/parameters/SubjectIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradeRequest'
      responses:
        '200':
          description: Grade updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeResponse'
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '404':
          description: Grade not found
    delete:
      tags: [Grades]
      summary: Delete a grade
      operationId: deleteGrade
      parameters:
        - $ref: '#/components/parameters/StudentIdPath'
        - $ref: '#/components/parameters/SubjectIdPath'
      responses:
        '204':
          description: Grade deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: Grade not found

  /v1/audit:
    get:
      tags: [Audit]
      summary: Get all audit entries (optionally filtered by operation type)
      operationId: getAllAuditEntries
      parameters:
        - name: type
          in: query
          required: false
          description: Filter by operation type
          schema:
            type: string
            enum: [INSERT, UPDATE, DELETE]
      responses:
        '200':
          description: List of audit entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — ADMIN role required

  /v1/audit/student/{studentId}:
    get:
      tags: [Audit]
      summary: Get audit entries by student
      operationId: getAuditEntriesByStudent
      parameters:
        - $ref: '#/components/parameters/StudentIdPath'
      responses:
        '200':
          description: List of audit entries for the student
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — ADMIN role required
        '404':
          description: Student not found

  /v1/audit/stats:
    get:
      tags: [Audit]
      summary: Get audit statistics (count per operation type)
      operationId: getAuditStats
      responses:
        '200':
          description: Audit statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditStatsResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — ADMIN role required

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int32
        example: 1

    StudentIdPath:
      name: studentId
      in: path
      required: true
      schema:
        type: integer
        format: int32
        example: 1

    SubjectIdPath:
      name: subjectId
      in: path
      required: true
      schema:
        type: integer
        format: int32
        example: 2

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          maxLength: 50
          example: user1
        password:
          type: string
          example: user123

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        username:
          type: string
          example: user1
        role:
          type: string
          enum: [ADMIN, USER]
          example: USER

    StudentRequest:
      type: object
      required: [fullName]
      properties:
        fullName:
          type: string
          maxLength: 100
          example: John Doe

    StudentResponse:
      type: object
      properties:
        studentId:
          type: integer
          format: int32
          example: 1
        fullName:
          type: string
          example: John Doe
        average:
          type: number
          format: double
          example: 15.5

    SubjectRequest:
      type: object
      required: [label, coefficient]
      properties:
        label:
          type: string
          maxLength: 100
          example: Mathematics
        coefficient:
          type: number
          format: double
          minimum: 0.01
          example: 3.0

    SubjectResponse:
      type: object
      properties:
        subjectId:
          type: integer
          format: int32
          example: 2
        label:
          type: string
          example: Mathematics
        coefficient:
          type: number
          format: double
          example: 3.0

    GradeRequest:
      type: object
      required: [studentId, subjectId, value]
      properties:
        studentId:
          type: integer
          format: int32
          example: 1
        subjectId:
          type: integer
          format: int32
          example: 2
        value:
          type: number
          format: double
          minimum: 0
          maximum: 20
          example: 14.25

    GradeResponse:
      type: object
      properties:
        studentId:
          type: integer
          format: int32
          example: 1
        studentName:
          type: string
          example: John Doe
        subjectId:
          type: integer
          format: int32
          example: 2
        subjectLabel:
          type: string
          example: Mathematics
        value:
          type: number
          format: double
          example: 14.25

    AuditResponse:
      type: object
      properties:
        auditId:
          type: integer
          format: int32
          example: 42
        operationType:
          type: string
          enum: [INSERT, UPDATE, DELETE]
          example: UPDATE
        updatedAt:
          type: string
          format: date-time
          example: '2026-03-19T01:11:16'
        studentId:
          type: integer
          format: int32
          example: 1
        studentName:
          type: string
          example: John Doe
        subjectLabel:
          type: string
          example: Mathematics
        oldValue:
          type: number
          format: double
          example: 12.0
        newValue:
          type: number
          format: double
          example: 14.0
        dbUser:
          type: string
          example: user1

    AuditStatsResponse:
      type: object
      properties:
        insertCount:
          type: integer
          format: int64
          example: 10
        updateCount:
          type: integer
          format: int64
          example: 4
        deleteCount:
          type: integer
          format: int64
          example: 2
        totalCount:
          type: integer
          format: int64
          example: 16