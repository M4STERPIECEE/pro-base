openapi: 3.0.3
info:
  title: BDA API
  description: REST API for managing students, grades, and audit logs.
  version: v1

servers:
  - url: /api
    description: Application context path

tags:
  - name: Students
    description: Student endpoints
  - name: Grades
    description: Grade endpoints
  - name: Audit
    description: Audit log and statistics endpoints

paths:
  /v1/students:
    get:
      tags: [Students]
      summary: Get all students
      operationId: getAllStudents
      responses:
        '200':
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentResponse'
    post:
      tags: [Students]
      summary: Create a new student
      operationId: createStudent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRequest'
      responses:
        '201':
          description: Student created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'

  /v1/students/{id}:
    get:
      tags: [Students]
      summary: Get a student by ID
      operationId: getStudentById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Student found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '404':
          description: Student not found
    put:
      tags: [Students]
      summary: Update a student
      operationId: updateStudent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRequest'
      responses:
        '200':
          description: Student updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
    delete:
      tags: [Students]
      summary: Delete a student
      operationId: deleteStudent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Student deleted successfully

  /v1/grades:
    get:
      tags: [Grades]
      summary: Get all grades
      operationId: getAllGrades
      responses:
        '200':
          description: List of grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GradeResponse'
    post:
      tags: [Grades]
      summary: Create a new grade
      operationId: createGrade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradeRequest'
      responses:
        '201':
          description: Grade created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeResponse'

  /v1/grades/student/{studentId}:
    get:
      tags: [Grades]
      summary: Get grades by student
      operationId: getGradesByStudent
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of grades for the student
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GradeResponse'

  /v1/grades/student/{studentId}/subject/{subjectId}:
    get:
      tags: [Grades]
      summary: Get a specific grade
      operationId: getGradeById
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Grade found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeResponse'
        '404':
          description: Grade not found
    put:
      tags: [Grades]
      summary: Update a grade
      operationId: updateGrade
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradeRequest'
      responses:
        '200':
          description: Grade updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GradeResponse'
    delete:
      tags: [Grades]
      summary: Delete a grade
      operationId: deleteGrade
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Grade deleted successfully

  /v1/audit:
    get:
      tags: [Audit]
      summary: Get all audit entries
      operationId: getAllAuditEntries
      responses:
        '200':
          description: List of audit entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditResponse'

  /v1/audit/student/{studentId}:
    get:
      tags: [Audit]
      summary: Get audit entries by student
      operationId: getAuditEntriesByStudent
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of audit entries for the student
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditResponse'

  /v1/audit/stats:
    get:
      tags: [Audit]
      summary: Get audit statistics
      operationId: getAuditStats
      responses:
        '200':
          description: Audit statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditStatsResponse'

components:
  schemas:
    StudentRequest:
      type: object
      required: [fullName]
      properties:
        fullName:
          type: string
          maxLength: 100
          example: John Doe

    StudentResponse:
      type: object
      properties:
        studentId:
          type: integer
          format: int32
          example: 1
        fullName:
          type: string
          example: John Doe
        average:
          type: number
          format: double
          example: 15.5

    GradeRequest:
      type: object
      required: [studentId, subjectId, value]
      properties:
        studentId:
          type: integer
          format: int32
          example: 1
        subjectId:
          type: integer
          format: int32
          example: 2
        value:
          type: number
          format: double
          minimum: 0
          maximum: 20
          example: 14.25

    GradeResponse:
      type: object
      properties:
        studentId:
          type: integer
          format: int32
          example: 1
        studentName:
          type: string
          example: John Doe
        subjectId:
          type: integer
          format: int32
          example: 2
        subjectLabel:
          type: string
          example: Mathematics
        value:
          type: number
          format: double
          example: 14.25

    AuditResponse:
      type: object
      properties:
        auditId:
          type: integer
          format: int32
          example: 42
        operationType:
          type: string
          example: UPDATE
        updatedAt:
          type: string
          format: date-time
          example: '2026-03-19T01:11:16'
        studentId:
          type: integer
          format: int32
          example: 1
        studentName:
          type: string
          example: John Doe
        subjectLabel:
          type: string
          example: Mathematics
        oldValue:
          type: number
          format: double
          example: 12.0
        newValue:
          type: number
          format: double
          example: 14.0
        dbUser:
          type: string
          example: postgres

    AuditStatsResponse:
      type: object
      properties:
        insertCount:
          type: integer
          format: int64
          example: 10
        updateCount:
          type: integer
          format: int64
          example: 4
        deleteCount:
          type: integer
          format: int64
          example: 2
        totalCount:
          type: integer
          format: int64
          example: 16
