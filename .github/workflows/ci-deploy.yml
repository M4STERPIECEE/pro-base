name: Deploy (main / develop)

on:
  push:
    branches: [ 'main', 'develop' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN:    ${{ secrets.DOCKER_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify Docker Hub secrets
        run: |
          if [ -z "${DOCKER_USERNAME}" ] || [ -z "${DOCKER_TOKEN}" ]; then
            echo "Missing DOCKER_USERNAME or DOCKER_TOKEN repository secrets."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/bda-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/bda-frontend:latest
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      SERVER_HOST:     ${{ secrets.SERVER_HOST }}
      SERVER_USER:     ${{ secrets.SERVER_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - name: Check SSH secrets availability
        id: ssh_check
        run: |
          if [ -n "${SERVER_HOST}" ] && [ -n "${SERVER_USER}" ] && [ -n "${SSH_PRIVATE_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy (missing SSH secrets)
        if: ${{ steps.ssh_check.outputs.enabled != 'true' }}
        run: echo "SSH secrets are missing — skipping deploy."

      - name: Deploy via SSH
        if: ${{ steps.ssh_check.outputs.enabled == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key:      ${{ env.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/bda-notes
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f